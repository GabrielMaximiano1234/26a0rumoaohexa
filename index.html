<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>26a0 Rumo ao Hexa - Início 🇧🇷</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="lobby-container" id="tela-inicio">
    <h1 class="logo-retro">26a0 <span>RUMO AO HEXA</span></h1>
    <p style="text-align: center; font-weight: 700; margin-bottom: 25px; color: var(--br-blue);">Escale as maiores lendas da nossa pátria de chuteiras para conquistar a glória máxima mundial! [3]</p>
    
    <div class="lobby-card">
      <!-- 1. Nome do Treinador -->
      <div class="lobby-group">
        <label for="coach-name-input">NOME DO TREINADOR</label>
        <input type="text" id="coach-name-input" class="lobby-input" placeholder="Digite seu nome, Professor..." value="Mister">
      </div>

      <!-- 2. Esquema Tático -->
      <div class="lobby-group">
        <label>ESQUEMA TÁTICO [3]</label>
        <div class="tactic-grid">
          <div class="tactic-card active" data-tactic="4-3-3">
            <div class="tactic-name">4-3-3</div>
            <div class="tactic-desc">Ataque Total [3]</div>
          </div>
          <div class="tactic-card" data-tactic="4-4-2">
            <div class="tactic-name">4-4-2</div>
            <div class="tactic-desc">Equilíbrio Histórico [3]</div>
          </div>
          <div class="tactic-card" data-tactic="3-5-2">
            <div class="tactic-name">3-5-2</div>
            <div class="tactic-desc">Solidez & Alas [3]</div>
          </div>
        </div>
      </div>

      <!-- 3. Modo de Jogo -->
      <div class="lobby-group">
        <div class="toggle-container">
          <div>
            <div style="font-weight: 900; font-size: 0.95rem;">Modo Clássico [4]</div>
            <div style="font-size: 0.75rem; color: #555;">Mostrar ratings reais e qualidades dos jogadores nas cartas [4].</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="mode-classic-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 4. Botão de Iniciar -->
      <button type="button" id="btn-iniciar-draft" class="btn-start-game">CONVOCAR SELEÇÃO ➔</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
